name: Create Theme Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release ZIP
        run: |
          mkdir bootstrap-component-blox
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.gitignore' --exclude='README.md' . bootstrap-component-blox/
          zip -r bootstrap-component-blox.zip bootstrap-component-blox/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          files: bootstrap-component-blox.zip
          generate_release_notes: true
          draft: false
          prerelease: false
